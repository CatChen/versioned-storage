# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, '[0-9]+-[0-9]+-*']
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/create-github-app-token@v3
        id: get-github-app-token
        with:
          app-id: ${{ secrets.CHECK_GIT_STATUS_BOT_APP_ID }}
          private-key: ${{ secrets.CHECK_GIT_STATUS_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: yarn

      - run: yarn install --immutable

      - name: Reformat
        run: |
          yarn prettier --write .
          yarn lint --fix || true # Ignore errors and leave them to the ESLint workflow

      - name: Push changes back to the Pull Request
        uses: CatChen/check-git-status-action@v2
        id: check-git-status
        with:
          fail-if-not-clean: ${{ github.actor != 'dependabot[bot]' || github.actor_id != 49699333 }}
          push-if-not-clean: true
          request-changes-if-not-clean: false
          push-token: ${{ steps.get-github-app-token.outputs.token }}

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: yarn

      - run: yarn install --immutable

      - name: Run ESLint
        uses: CatChen/eslint-suggestion-action@v4
        with:
          targets: 'src'
          fail-check: ${{ github.event_name == 'workflow_call' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

  validate:
    name: Validate
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Get Yarn cache path
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - run: yarn install --immutable

      - name: Validate code with TypeScript
        run: yarn build

      - name: Validate package exports
        run: node -e 'import("./index.js")'

      - name: Validate code with Flow
        run: yarn flow

      - name: Test and collect coverage
        run: yarn test src --coverage --collectCoverageFrom=src/**/*.ts

      - name: Upload test coverage
        uses: codecov/codecov-action@v6
